<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTERMUN'26 Check-In</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --primary: #673ab7; 
            --success: #28a745; 
            --warning: #ffc107;
            --error: #dc3545; 
            --bg: #f8f9fa; 
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            transition: background 0.4s ease; 
        }
        .container { 
            width: 90%; 
            max-width: 450px; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
        }
        h2 { color: var(--primary); margin-top: 0; font-weight: 800; letter-spacing: 1px; }
        
        #reader { 
            width: 100%; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid #eee !important; 
            background: #000;
        }
        
        #result { 
            margin-top: 20px; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 600; 
            font-size: 15px;
            transition: all 0.3s;
        }

        .loading { background: #e9ecef; color: #495057; border: 1px solid #dee2e6; }
        .success-bar { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning-bar { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .error-bar { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Modal Styling */
        #modal-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-box {
            width: 85%; 
            max-width: 380px; 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .modal-box h2 { color: white; margin-bottom: 10px; }
        .btn-ok {
            margin-top: 20px; 
            padding: 12px 40px; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
            background: white;
            color: #333;
            transition: transform 0.2s;
        }
        .btn-ok:active { transform: scale(0.95); }
        
        .footer-text { margin-top: 20px; font-size: 11px; color: #adb5bd; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ASTERMUN'26</h2>
        <div id="reader"></div>
        <div id="result" class="loading">Initialising Camera...</div>
        <p class="footer-text">Official Check-In Portal</p>
    </div>

    <div id="modal-overlay">
        <div id="modal-box" class="modal-box">
            <h2 id="modal-title">TITLE</h2>
            <p id="modal-msg">Message goes here.</p>
            <button class="btn-ok" onclick="closeModal()">DISMISS</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby5hxTnSE_Y4fgnwESDH6Eiy_Oqm4D93qOHQq3Um4X5EW3rDkQw_7Gs15w5J-GMQkGdbg/exec"; 
        const resultDiv = document.getElementById('result');
        const html5QrCode = new Html5Qrcode("reader");

        // --- 2. INITIALIZE SCANNER ---
        function startScanner() {
            const config = { fps: 20, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                resultDiv.innerHTML = "Ready to Scan";
            })
            .catch(err => {
                resultDiv.className = "error-bar";
                resultDiv.innerHTML = "Camera Error: " + err;
            });
        }

        // --- 3. ON SUCCESSFUL SCAN ---
        function onScanSuccess(decodedText) {
            html5QrCode.pause();
            
            resultDiv.className = "loading";
            resultDiv.innerHTML = "Verifying Delegate...";

            // Sending POST without no-cors to read JSON response
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ qrData: decodedText })
            })
            .then(response => response.json()) // Parsing the JSON response from Google
            .then(data => {
                if (data.status === "SUCCESS") {
                    showModal("CHECKED IN", data.message, "#28a745");
                    resultDiv.className = "success-bar";
                    resultDiv.innerHTML = "✅ " + data.message;
                    vibratePhone([100, 50, 100]); // Success pattern
                } else if (data.status === "ALREADY") {
                    showModal("DUPLICATE", data.message, "#f39c12"); // Orange/Yellow
                    resultDiv.className = "warning-bar";
                    resultDiv.innerHTML = "⚠️ " + data.message;
                    vibratePhone(500); // Long vibration for warning
                } else {
                    showModal("ERROR", data.message, "#dc3545");
                    resultDiv.className = "error-bar";
                    resultDiv.innerHTML = "❌ " + data.message;
                }
            })
            .catch(err => {
                showModal("NETWORK ERROR", "Unable to connect to Sheets. Check your Internet.", "#dc3545");
                resultDiv.className = "error-bar";
                resultDiv.innerHTML = "❌ Connection Failed";
            });
        }

        // --- 4. UI UTILITIES ---
        function showModal(title, msg, bgColor) {
            document.getElementById("modal-title").innerText = title;
            document.getElementById("modal-msg").innerText = msg;
            document.getElementById("modal-box").style.backgroundColor = bgColor;
            document.getElementById("modal-overlay").style.display = "flex";
            document.body.style.backgroundColor = bgColor + "33"; 
        }

        function closeModal() {
            document.getElementById("modal-overlay").style.display = "none";
            document.body.style.backgroundColor = "#f8f9fa";
            resultDiv.className = "loading";
            resultDiv.innerHTML = "Ready to Scan";
            html5QrCode.resume();
        }

        function vibratePhone(pattern) {
            if ("vibrate" in navigator) {
                navigator.vibrate(pattern);
            }
        }

        window.onload = startScanner;
    </script>
</body>
</html>
